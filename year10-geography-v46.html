  let answer=isMcq?`Correct answer: ${correct}. ${q.why||""}`:q.model;
  let rubric=!isMcq&&Array.isArray(q.checks)&&typeof q.checks[0]==="string"?`<details style="margin-top:8px"><summary>Rubric checklist</summary><ul>${q.checks.map(c=>`<li>${esc(c)}</li>`).join("")}</ul></details>`:"";
  return `<div class="neutral readItem" style="margin:10px 0"><div><span class="badge">${i+1}</span><span class="badge">${esc(q.topic)}</span><span class="badge">${isMcq?"MCQ":(q.marks||"?")+" marks"}</span>${probBadge(q)}</div><h3>${esc(q.q)}</h3><div class="answer"><b>Model answer</b><p>${esc(answer)}</p>${rubric}</div></div>`;
}
function readQA(){let teacher=sortPred([...allQ().filter(isTeacher),...DATA.mcq.filter(isTeacher)]), extra=sortPred([...allQ().filter(q=>!isTeacher(q)),...DATA.mcq.filter(q=>!isTeacher(q))]);let first=teacher.slice(0,70), rest=teacher.slice(70);return `<div class="card" style="margin-top:14px"><h3>Read Q&A</h3><p class="small">Core set: read these 70 model answers first. Stop there if time is tight.</p><button class="btn" onclick="window.print()">Print / save as PDF</button><div style="margin-top:14px">${first.map((q,i)=>readBlock(q,i)).join("")}</div><div class="good" style="margin-top:14px"><b>Core Q&A complete.</b> Use the optional sections below only if you have time.</div><details class="card" style="margin-top:14px"><summary>More Q&A, optional (${rest.length})</summary>${rest.map((q,i)=>readBlock(q,i+first.length)).join("")}</details><details class="card" style="margin-top:14px"><summary>Extra revision Q&A, optional (${extra.length})</summary>${extra.map((q,i)=>readBlock(q,i)).join("")}</details></div>`}


function practice(){
  if(!["short","peel","case","mock"].includes(state.practice))state.practice="short";
  let modes=[["short","Short answers"],["peel","PEEL answers"],["case","Case studies"],["mock","Mini mock"]];
  function current(kind){
    let q=byId(state.qid);
    let valid=q && isTeacher(q) && (kind==="auto"?DATA.auto.some(a=>a.id===q.id):DATA.rubric.some(r=>r.id===q.id));
    if(!valid){q=pick(kind);state.qid=q.id}
    return q;
  }
  return `<h2 class="title">Practice</h2><div class="notice"><b>Practise in order:</b> Short answers first, then PEEL, case studies and a mini mock.</div><div class="chips">${modes.map(x=>`<button class="btn ${state.practice===x[0]?"dark":""}" onclick="setPractice('${x[0]}')">${x[1]}</button>`).join("")}</div>${state.practice==="short"?qCard(current("auto"),false):state.practice==="peel"?qCard(current("rubric"),true):state.practice==="case"?casePractice():mock()}`}
function qCard(q,isRub){state.qid=q.id;return `<div class="card" style="margin-top:14px"><span class="badge">${esc(q.topic)}</span><span class="badge">${q.marks} marks</span>${probBadge(q)}<h2>${esc(q.q)}</h2><textarea id="ans" placeholder="Write answer here."></textarea><div class="actions"><button class="btn dark" onclick="${isRub?"showRubric()":"checkAuto()"}">${isRub?"Show rubric":"Check and save"}</button><button class="btn" onclick="showModel()">Show model</button><button class="btn" onclick="nextQ('${isRub?"rubric":"auto"}')">Next</button></div><div id="resultBox">${state.result?resultHtml(q,state.result):""}</div></div>`}
function resultHtml(q,r){return `<div class="grid g2" style="margin-top:14px"><div class="card"><h3>Score ${r.score}/${q.marks} (${r.percent}%)</h3>${bar(r.percent)}${r.advice?.length?`<ul>${r.advice.map(a=>`<li>${esc(a)}</li>`).join("")}</ul>`:""}</div><div class="card"><h3>Checklist</h3>${r.checks.map(c=>`<div class="${c.ok?"good":"bad"}" style="margin:6px 0">${c.ok?"✓":"×"} ${esc(c.label)}</div>`).join("")}</div></div>`}
function casePractice(){let cases=sortedCases().slice(0,7),c=cases[state.caseIndex%cases.length];return `<div class="card" style="margin-top:14px"><span class="badge">${state.caseIndex%cases.length+1}/${cases.length}</span><span class="badge">${esc(c.topic)}</span>${probBadge(c)}<h2>Case study: ${esc(c.name)}</h2><textarea placeholder="Optional: location/problem, 3 causes, 3 impacts, 3 responses, one development link."></textarea><div class="warn" style="margin-top:14px"><b>Must include:</b> ${esc(c.gold)}</div><details style="margin-top:12px"><summary>Show full case notes</summary><div class="grid g3" style="margin-top:12px">${["causes","impacts","responses"].map(k=>`<div class="neutral"><h3>${k}</h3><ul>${(c[k]||[]).map(v=>`<li>${esc(v)}</li>`).join("")}</ul></div>`).join("")}</div></details><div class="actions"><button class="btn" onclick="backCase()">Back case</button><button class="btn dark" onclick="nextCase()">Next case</button></div><p class="small">Only the 7 core case studies appear here. More case studies are optional in Learn.</p></div>`}
function mock(){let topics=["Development + LICs","Food","Water","Trade","Health + Malaria","PEEL + Source"];let pool=sortPred(allQ().filter(isTeacher));let qs=[];topics.forEach(t=>{let q=pool.find(x=>x.topic===t&&!qs.includes(x));if(q)qs.push(q)});pool.forEach(q=>{if(qs.length<10&&!qs.includes(q))qs.push(q)});return `<div class="card" style="margin-top:14px"><h2>Mini mock</h2>${qs.slice(0,10).map((q,i)=>`<div class="neutral" style="margin:10px 0"><span class="badge">${esc(q.topic)}</span><span class="badge">${q.marks} marks</span>${probBadge(q)}<h3>Q${i+1}. ${esc(q.q)}</h3><details><summary>Model answer</summary><p>${esc(q.model)}</p>${Array.isArray(q.checks)&&typeof q.checks[0]==="string"?`<ul>${q.checks.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>`:""}</details></div>`).join("")}</div>`}

function review(){
  let s=stats();
  let weak=(progress.attempts||[]).filter(a=>a.percent<75).slice(-60).reverse();
  let readiness=s.total>=80 && s.avg>=75 && s.peels.length>=6 ? "Ready to polish" : s.total>=35 && s.avg>=60 ? "On track, needs targeted practice" : s.total>0 ? "Needs more practice" : "Not started";
  let cls=readiness==="Ready to polish"?"statusGood":readiness==="On track, needs targeted practice"?"statusWarn":"statusBad";
  let next=s.weak[0]?.topic || "Mini mock";
  let parentAdvice=s.total===0
    ? "Ask her to start with Learn → Study Pack, then Read Q&A."
    : s.avg<60
      ? "Do not start more mocks yet. Ask her to read Study Pack, then redo short answers for the weakest topic."
      : s.peels.length<4
        ? "Move her into PEEL answers. These are where longer marks are gained."
        : "Use Mini mock, then Review anything below 75%.";

  return `<h2 class="title">Review</h2>
  <div class="${cls} statusBox"><b>Parent view:</b> ${readiness}. ${parentAdvice}</div>
  <div class="grid g3" style="margin-top:14px">
    <div class="card"><div class="small">Attempts</div><div style="font-size:34px;font-weight:900">${s.total}</div><div class="small">Aim: 50+ before the exam</div></div>
    <div class="card"><div class="small">Average</div><div style="font-size:34px;font-weight:900">${s.avg}%</div>${bar(s.avg)}</div>
    <div class="card"><div class="small">Focus next</div><div style="font-size:21px;font-weight:900">${esc(next)}</div><div class="small">Redo below 75%</div></div>
  </div>

  <div class="grid g2" style="margin-top:14px">
    <div class="card"><h3>How you can help tonight</h3>
      <ol>
        <li>Ask her to explain one top case study aloud: Yemen, Sahel, GERD, Rana Plaza or malaria.</li>
        <li>Check she can use the phrase: cause → effect → development link.</li>
        <li>Make her do two PEEL answers, then compare with the model.</li>
        <li>Use Review to redo anything below 75%.</li>
      </ol>
    </div>
    <div class="card"><h3>Progress signals</h3>
      <div class="parentLine"><span>PEEL attempts</span><b>${s.peels.length}</b></div>
      <div class="parentLine"><span>Weakest topic</span><b>${esc(next)}</b></div>
      <div class="parentLine"><span>Practice volume</span><b>${s.total<20?"Low":s.total<60?"Medium":"Strong"}</b></div>
      <div class="parentLine"><span>Accuracy</span><b>${s.avg?`${s.avg}%`:"Not started"}</b></div>
    </div>
  </div>

  <div class="card" style="margin-top:14px"><h3>Topic coverage</h3>
    ${s.topics.map(t=>`<div style="margin:9px 0"><b>${esc(t.topic)}</b><span class="right small">${t.count?`${t.percent}% · ${t.count} attempts`:"not attempted"}</span>${bar(t.count?t.percent:3)}</div>`).join("")}
  </div>

  <div class="card" style="margin-top:14px"><h3>Redo below 75%</h3>
    ${weak.length?weak.map(a=>`<div class="neutral" style="margin:8px 0"><b>${esc(a.topic)}</b><span class="right">${a.score}/${a.marks} · ${a.percent}%</span><p>${esc(a.prompt)}</p></div>`).join(""):"No weak answers yet."}
  </div>

  <div class="actions"><button class="btn" onclick="exportProgress()">Export backup</button><label class="btn" for="importFile">Import backup</label><input id="importFile" class="file" type="file" accept="application/json" onchange="importProgressFile(event)"><button class="btn red" onclick="if(confirm('Clear progress?')){progress={attempts:[]};save();render()}">Clear progress</button></div>`;
}

render();
</script>
</body>
</html>
