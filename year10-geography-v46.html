*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.55}header{position:sticky;top:0;z-index:10;background:rgba(248,250,252,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}.wrap{max-width:1120px;margin:auto;padding:14px}h1{margin:0;font-size:22px}.sub{font-size:13px;color:var(--muted);margin-top:2px}.hero{background:linear-gradient(135deg,#0f172a,#334155);color:#fff;border-radius:0 0 20px 20px;padding:16px 18px;margin:-14px -2px 12px;display:flex;justify-content:space-between;gap:12px;align-items:center}.hero .sub{color:rgba(255,255,255,.8)}.tag{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;white-space:nowrap}.nav,.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.nav{background:#fff;border:1px solid var(--line);border-radius:16px;padding:5px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.nav .btn{flex:1;min-width:96px}.btn{border:1px solid var(--line);background:#fff;color:#334155;border-radius:12px;padding:9px 12px;font-weight:800;cursor:pointer;transition:.12s}.btn:hover{background:var(--soft);transform:translateY(-1px)}.btn.dark{background:var(--dark);border-color:var(--dark);color:#fff}.btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn.red{background:#fee2e2;border-color:#fecaca;color:#991b1b}.card,.neutral,.notice,.warn,.good,.bad{border-radius:18px;border:1px solid var(--line);background:#fff;padding:16px}.card{box-shadow:0 1px 2px rgba(15,23,42,.05)}.neutral{border-radius:16px}.notice{background:#f8fafc;color:#334155}.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.good{background:#f0fdf4;border-color:#bbf7d0;color:#14532d}.bad{background:#fef2f2;border-color:#fecaca;color:#7f1d1d}.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:860px){.g2,.g3,.g4{grid-template-columns:1fr}.hero{display:block}.tag{display:inline-block;margin-top:10px}}.title{font-size:24px;font-weight:900;margin:0 0 8px}.small{font-size:12px;color:var(--muted)}.badge,.prob{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900;margin:0 6px 6px 0;border:1px solid #e2e8f0;background:#f1f5f9;color:#475569}.prob.vh{background:#dcfce7;color:#166534;border-color:#bbf7d0}.prob.h{background:#e0f2fe;color:#075985;border-color:#bae6fd}.prob.m{background:#fef3c7;color:#92400e;border-color:#fde68a}.gold{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:9px;margin:6px 0;color:#9a3412}.sample,.answer{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px;margin:7px 0}textarea,input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:15px;background:#fff}textarea{min-height:130px;resize:vertical}textarea:focus,input:focus{outline:none;border-color:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.2)}.bar{height:7px;border-radius:99px;background:#e2e8f0;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:var(--red)}.bar span.ok{background:var(--green)}.bar span.mid{background:var(--amber)}summary{cursor:pointer;font-weight:900}.readItem{border-left:5px solid #0f172a}.right{float:right}.file{display:none}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}@media print{header,.nav,.chips,.btn,input,textarea{display:none!important}.wrap{max-width:100%;padding:0}.card,.neutral,.notice,.warn,.good,.bad{box-shadow:none;break-inside:avoid}}

<script>
const APP_META={appId:"year10-geography",subject:"Geography",exam:"Year 10",schemaVersion:3,appVersion:"v46"};
const LEGACY_KEYS=["y10geoSimpleV16","y10geoSimpleV17","y10geoSimpleV18","y10geoSimpleV19","y10geoSimpleProgress"];
const LEARN_PACK=[{"topic":"Development + LICs","must":["Development = improving quality of life, not just money.","Three dimensions: economic, social and environmental.","GDP per capita = average economic output or income per person; HDI = income/GNI + education + life expectancy; Gini = inequality.","LIC incomes can be low because of low-value farming/raw materials, weak infrastructure, conflict and poor governance.","Countries earn money through exports: crops, minerals, manufactured goods, tourism, education and services."],"gold":["Development is a journey, not a label.","GDP shows money, but HDI shows a wider picture of quality of life.","Averages can hide inequality inside a country.","Raw materials usually earn less than manufactured goods, so LICs need value-added exports."],"data":["NZ inequality example: richest 10% own 59% of wealth; poorest 50% own 2%.","Use NZ vs Ethiopia to compare development pathway, indicators and DTM stage."],"samples":["HDI is better than GDP because it includes health and education, but it can still hide inequality because it uses national averages.","LIC income may be low when countries rely on raw materials with low unstable prices and lack infrastructure to process them into higher-value goods."],"likely":["Define development and dimensions.","Why HDI is better than GDP but still limited.","Why LIC income is low and how exports help.","Explain physical and human factors affecting development."]},{"topic":"Food","must":["Food security = physical and economic access to enough safe and nutritious food.","Availability = food exists; access = people can afford/reach it; utilisation = food is safe and nutritious.","Sahel: low rainfall + overgrazing → bare soil → erosion → desertification → less food.","Yemen: conflict damages farms, roads, ports and markets, raising prices and causing malnutrition.","Sudan/South Sudan: conflict + climate shocks cause displacement, failed harvests and food insecurity."],"gold":["Food shortage answers need causes, consequences and solutions.","Conflict disrupts the whole food system: production, transport, markets and aid.","Technology helps production, but cannot solve hunger without access, peace and affordability."],"data":["Yemen: conflict since 2015 is a key cause of food insecurity.","Use Sahel as the physical-human interaction case.","Use Sudan/South Sudan as the second food case for breadth."],"samples":["In Yemen, conflict damages ports and roads, reducing food supply and increasing prices. This causes malnutrition and disease, lowering quality of life.","In the Sahel, low rainfall reduces vegetation and overgrazing removes remaining plants, causing erosion and desertification."],"likely":["Use Yemen to explain why conflict causes food shortages.","Climate vs conflict: to what extent?","Causes, impacts and responses for Sahel/Yemen/Sudan."]},{"topic":"Water","must":["Physical water scarcity = not enough freshwater exists naturally.","Economic water scarcity = water exists but people lack money, pipes, pumps or infrastructure.","Clean water reduces disease, improves school/work attendance and supports farming.","GERD: Ethiopia wants electricity and development; Egypt fears reduced Nile water.","Aral Sea: river diversion for cotton irrigation caused shrinking, salty soils, fishing collapse and health issues."],"gold":["Water supports development through health, education, farming, income and quality of life.","Water can cause conflict, but also cooperation through data sharing, agreed releases and negotiation.","Always link water access to disease, school, work or food security."],"data":["Water access table examples: Norway 100%, New Zealand 95.6%, Brazil 73.1%, India 62.0%, Nigeria 23.7%, Ethiopia 12.0%.","GERD is on the Blue Nile in Ethiopia; Egypt is downstream."],"samples":["Clean water reduces cholera and diarrhoea, so children miss fewer school days and adults can work more productively.","GERD creates tension because Ethiopia benefits from hydroelectric power while Egypt fears less water for farming."],"likely":["Physical vs economic water scarcity.","How water improves development.","GERD conflict/cooperation.","Use water data to describe a pattern."]},{"topic":"Trade","must":["Export = good/service sold to another country; import = bought from another country.","Trade can create jobs, export income and tax revenue.","Trade can increase inequality if wages are low, factories unsafe or LICs export only raw materials.","Rana Plaza: Bangladesh garment factory complex collapsed in 2013; 1,134 killed and 2,500+ injured.","DRC/raw materials: resource-rich countries can stay poor if value is captured elsewhere."],"gold":["Trade helps development only when jobs are safe, wages fair and profits shared more equally.","Raw materials earn less than manufactured goods, so value-added exports matter.","Fast fashion shows that cheap goods can hide human and environmental costs."],"data":["Rana Plaza: 24 April 2013; 1,134 killed; 2,500+ injured.","Post-Rana Plaza inspections and Accord reforms show progress, but worker pay and power remain issues."],"samples":["Rana Plaza shows that global trade can create jobs but also expose workers to unsafe conditions when brands demand cheap clothing.","Raw-material exports can keep LICs poorer because prices are low/unstable and richer countries capture profit through manufacturing."],"likely":["Trade always helps development: to what extent?","Use Rana Plaza to explain progress and remaining inequality.","Why raw-material exports keep LICs poorer.","How countries earn money through exports."]},{"topic":"Health + Malaria","must":["Health and development are linked: illness reduces school, work, income and quality of life.","LICs often face more communicable diseases; HICs often face more non-communicable diseases because people live longer.","Malaria is spread by female Anopheles mosquitoes.","Malaria is common in warm, wet areas with stagnant water, poverty, poor housing and limited healthcare.","Responses: bed nets, indoor spraying, rapid tests, ACT medicines, vaccines, drainage and education."],"gold":["Malaria creates a poverty cycle: poor health lowers income, and poverty limits prevention and treatment.","For malaria, always include causes, consequences and solutions.","Health patterns reflect development level and healthcare access."],"data":["WHO-style global pattern: most malaria burden is in the African Region/Sub-Saharan Africa.","Under-5 children and pregnant women are especially vulnerable."],"samples":["Malaria slows development because children miss school, adults miss work and families spend money on treatment, reducing productivity and income.","No single malaria solution is enough because mosquitoes, poverty, housing and healthcare all affect transmission."],"likely":["Why malaria is common in Sub-Saharan Africa.","Consequences of malaria for development.","Evaluate malaria responses.","Compare LIC and HIC health patterns."]},{"topic":"PEEL + Source","must":["PEEL = Point, Evidence, Explanation, Link.","Describe = what you see; explain = why; evaluate/to what extent = both sides + judgement.","Source answers need exact data, place names and pattern/trend language.","Limitations: one year only, national averages, missing groups/causes/regional detail.","Every long answer must end with a development link."],"gold":["Use because → this means → therefore.","Never write only ‘it is high’; use numbers and places.","A strong link mentions health, education, income, jobs, equality or quality of life."],"data":["Good source phrase: ‘The highest value is… while the lowest is… showing a clear gap.’","Good limitation phrase: ‘This is a national average, so it may hide regional or wealth differences.’"],"samples":["Point: Clean water improves development. Evidence: Ethiopia has much lower water access than Norway. Explanation: unsafe water increases disease and school absence. Link: therefore water affects health, education and quality of life.","For ‘to what extent’, write: I partly agree… however… therefore…"],"likely":["Write a PEEL paragraph using a case study.","Use source data to describe a pattern.","Suggest limitations of a source.","Improve a weak answer."]}];
const DATA={"topics":["All","Development + LICs","Food","Water","Trade","Health + Malaria","PEEL + Source","Extra Revision"],"critical":[["Development + LICs","Development definitions, indicators, LIC income, exports, development pathway and exam-ready answer phrases."],["Food","Food security, Sahel, Yemen, Sudan/South Sudan, causes, impacts, responses, technology and case-study chains."],["Water","Water scarcity, clean water and development, GERD, Aral Sea, conflict/cooperation and water-data answers."],["Trade","Trade definitions, exports, raw materials/DRC, Rana Plaza, fast fashion, inequality and development judgement."],["Health + Malaria","LIC/HIC health patterns, malaria causes, impacts, solutions, poverty cycle and development links."],["PEEL + Source","Command words, PEEL, source evidence, limitations, golden sentence starters and development-link phrases."]],"quickFacts":["Development means improving people's quality of life across economic, social and environmental dimensions.","Economic development includes jobs, income, trade, industry and infrastructure.","Social development includes health, education, safety, housing, equality and freedom.","Environmental development includes clean air/water, biodiversity and sustainable land and energy use.","HDI combines life expectancy, education and GNI per capita.","Gini measures inequality: 0 = equal, 1 = totally unequal.","Development is a journey, not a label: countries can improve or regress over time.","LIC incomes can be low because countries rely on low-value farming or raw materials, weak infrastructure, conflict or poor governance.","Food security means physical and economic access to sufficient, safe, nutritious food at all times.","Malthus argued population grows faster than food supply, but the Green Revolution showed technology can increase yields.","The modern food problem is often access, distribution, waste, conflict and poverty, not only production.","In the Sahel, low rainfall and overgrazing remove vegetation, expose soil and cause desertification.","In Yemen, conflict damages farms, roads, ports and markets, reducing food supply and raising prices.","Water is essential because it improves health, school attendance, farming, jobs and income.","Physical water scarcity means not enough water exists; economic water scarcity means water exists but people cannot access it.","Ethiopia wants GERD for electricity and development, while Egypt worries about reduced Nile water.","Trade can create jobs and export income, but can also increase inequality if workers are underpaid.","Raw-material exports usually earn less than manufactured or high-value exports.","Rana Plaza shows the human cost of cheap fast fashion and weak worker protection.","Health and development are linked because sick people miss school and work, reducing income.","Malaria slows development because it causes illness, school absence, work absence and treatment costs.","Strong 5–7 mark answers use PEEL, specific evidence and a final judgement/development link.","Source answers need exact evidence: number, place, trend or pattern.","The golden chain is cause → effect → development impact.","No single indicator is perfect; geographers combine GDP, GNP, life expectancy, literacy, HDI, GII, Gini and wellbeing data.","Global North and Global South are useful patterns but have exceptions such as Australia and oil-rich Gulf states.","Physical factors such as drought, landlocked location, hazards and poor soils interact with human factors such as colonialism, trade, governance and conflict.","Development pathways often move from agriculture to industry to services and knowledge, but shocks can slow or reverse progress.","Fast fashion has social costs for workers and environmental costs from water use, chemical dyes, microplastics and landfill waste."],"stats":[{"topic":"NZ inequality","stat":"Top 10% own 59% of wealth; bottom 50% own 2%; top 1% typical net worth about $6.2m vs median NZer $92k."},{"topic":"HDI","stat":"HDI ranges 0–1. Very high: 0.80–1.00. Low: below 0.55. NZ about 0.930; Ethiopia about 0.492; South Sudan about 0.385."},{"topic":"Malthus / Green Revolution","stat":"Population heading to ~11b by 2100. Cereal production rose 3.5× since 1961, population 2.6×. Food waste about 1/3."},{"topic":"Sahel","stat":"Semi-arid belt; rainfall about 200–600mm/year. Stone bunds can increase yields by up to 50%."},{"topic":"Yemen","stat":"War since 2015; real GDP per capita down nearly 60%; Hudaydah port about 25% capacity; 600k+ under-5s acutely malnourished; aid funding about 9%."},{"topic":"Sudan / South Sudan","stat":"Sudan conflict from Apr 2023; 7m+ displaced; 18m food insecure in Sudan, 7m in South Sudan; Sudan food prices up 60%+."},{"topic":"Water access","stat":"Norway 100%, NZ 95.6%, Brazil 73.1%, India 62%, Nigeria 23.7%, Ethiopia 12%. Egypt relies on Nile for about 95% of freshwater."},{"topic":"Rana Plaza","stat":"24 Apr 2013, Savar, Bangladesh; 1,134 killed, 2,500+ injured; workers earned under US$100/month; Accord covered 1,600+ factories."},{"topic":"Malaria","stat":"~about 250 million+ malaria cases globally each year; about 94% of cases/deaths occur in Sub-Saharan Africa; under-5s about 75–80% of deaths in the African Region; Nigeria loses about US$1b/year."},{"topic":"Trade","stat":"China lifted 800m+ from poverty; Vietnam poverty fell from 70% in the 1990s to under 6%; DRC cobalt shows resource curse risk."}],"cases":[{"topic":"Food","subtopic":"Food Case Studies","name":"Sahel food supply","location":"Semi-arid belt south of the Sahara, across Mali, Niger, Chad, Sudan and nearby countries.","problem":"Food supply is unreliable because rainfall is low and variable, soils are fragile, and many people depend on subsistence farming and herding.","causes":["Low and unreliable rainfall","Drought","Poor fragile soils","Overgrazing","Deforestation","Rapid population growth","Conflict and weak infrastructure"],"impacts":["Crop failure","Livestock deaths","Hunger and malnutrition","Desertification","Lower income","School absence"],"responses":["Stone bunds","Drought-tolerant crops such as millet and sorghum","FMNR/agroforestry","Small-scale irrigation","Aid and early-warning systems"],"stats":["200–600mm rain/year","Stone bunds can raise yields up to 50%"],"gold":"Low rainfall reduces vegetation; overgrazing removes the remaining plants; bare soil is eroded, causing desertification and reducing food supply.","prob":98,"probReason":"Top predicted food/environment interaction case."},{"topic":"Food","subtopic":"Food Case Studies","name":"Yemen food crisis","location":"South-west Arabian Peninsula.","problem":"A severe food crisis mainly caused by conflict damaging farms, roads, ports, markets and health systems.","causes":["Conflict since 2015","Damaged ports and roads","Fuel shortages","Poverty and inflation","Water scarcity","Dirty water and disease","Dependence on food imports"],"impacts":["High food prices","Malnutrition","Cholera","Children missing school","Families eating fewer meals","Dependence on aid"],"responses":["Food aid","Peace talks","Rebuilding ports and roads","Repairing irrigation and terraces","Drought-resistant seeds","School meals"],"stats":["real GDP per capita down nearly 60% since 2015","Hudaydah port about 25% capacity","600k+ under-5s acutely malnourished","Aid funding about 9%"],"gold":"Conflict attacks all three food-security pillars: availability, access and utilisation.","prob":99,"probReason":"Top predicted food case: conflict, causes, impacts and responses."},{"topic":"Food","subtopic":"Food Case Studies","name":"Sudan and South Sudan food crisis","location":"Northeast Africa; Nile system, desert north and seasonal rainfall south.","problem":"Conflict, displacement, droughts, floods and inflation have created major food insecurity.","causes":["Conflict and displacement","Droughts and floods","Inflation","Destroyed farms and markets","Poor roads and services","Disease in camps"],"impacts":["Acute food insecurity","Malnutrition","Displacement","Disease","School absence","Lower harvests"],"responses":["Emergency food aid","Nutrition support","Seeds for farmers","Irrigation repair","Solar pumps","Peace talks"],"stats":["Sudan conflict from April 2023","7m+ displaced in Sudan","18m food insecure in Sudan; 7m in South Sudan","Food prices up 60%+ in Sudan"],"gold":"Both climate and conflict matter, but conflict stops people farming, trading and receiving aid.","prob":92,"probReason":"Likely second food case."},{"topic":"Water","subtopic":"Water","name":"Nile / GERD","location":"GERD is on the Blue Nile in Ethiopia; Egypt is downstream.","problem":"Ethiopia wants hydroelectric power and development, while Egypt fears reduced water for farming, drinking and industry.","causes":["Shared river basin","Upstream/downstream interests","Dam filling and operation","Population growth","Dependence on irrigation","Need for electricity"],"impacts":["Regional tension","Water security fears","Electricity for Ethiopia","Possible cooperation","Risk to farming in dry years"],"responses":["Shared data","Agreed water releases","Drought rules","Diplomatic negotiation","Regional power trade"],"stats":["Nile basin crosses 11 countries","Supports 250m+ people","Egypt relies on Nile for about 95% of freshwater"],"gold":"Water can cause conflict, but cooperation is possible through shared data and agreed releases.","prob":98,"probReason":"Top predicted water conflict/cooperation case."},{"topic":"Water","subtopic":"Water","name":"Aral Sea","location":"Central Asia, between Kazakhstan and Uzbekistan.","problem":"Rivers feeding the sea were diverted for cotton irrigation, causing the sea to shrink.","causes":["Soviet-era river diversion","Cotton irrigation","Poor water management","High evaporation","Overuse of water"],"impacts":["Fishing collapse","Salty soils","Health problems from dust","Local job losses","Ecosystem damage"],"responses":["Better irrigation","Water management","Kok-Aral Dam restoration in the north","Crop diversification","Reducing waste"],"stats":["Sea shrank to about 10% of original volume","Kok-Aral Dam helped North Aral partially recover"],"gold":"The Aral Sea shows how poor water management can damage health, jobs and ecosystems.","prob":90,"probReason":"Likely second water case."},{"topic":"Trade","subtopic":"Trade","name":"Rana Plaza / fast fashion","location":"Savar, Dhaka, Bangladesh.","problem":"Fast fashion creates jobs and export income but can rely on low wages and unsafe factories.","causes":["Pressure for cheap clothes","Weak worker protection","Unsafe buildings","Low wages","Global supply chains","Brand pressure"],"impacts":["1,134 workers killed","2,500+ injured","Global attention","Safety reforms","Ongoing low wage concerns"],"responses":["Bangladesh Accord","Factory inspections","Brand accountability","Consumer pressure","Better labour laws"],"stats":["24 Apr 2013","1,134 killed; 2,500+ injured","Workers earned under US$100/month","1,600+ factories covered by Accord"],"gold":"Trade supports development only when work is safe, fairly paid and protected.","prob":98,"probReason":"Top predicted trade/fast-fashion case."},{"topic":"Trade","subtopic":"Trade","name":"Raw-material exports / DRC","location":"DRC and other resource-rich LICs.","problem":"Countries can remain poor if they export raw materials cheaply instead of higher-value goods.","causes":["Low-value exports","Unstable commodity prices","Conflict","Corruption","Foreign control of profits","Weak infrastructure"],"impacts":["Low income","Few skilled jobs","Dependence on richer countries","Inequality","Limited tax revenue"],"responses":["Add value locally","Improve governance","Infrastructure investment","Fair trade rules","Skills and manufacturing"],"stats":["DRC has valuable cobalt for phones and EV batteries","Resource curse example"],"gold":"Raw materials usually earn less than manufactured goods, so LICs need value-added exports.","prob":96,"probReason":"Top predicted LIC income/export case."},{"topic":"Health + Malaria","subtopic":"Malaria","name":"Malaria in Sub-Saharan Africa","location":"Warm, wet parts of Sub-Saharan Africa.","problem":"Malaria causes illness and death and reduces school and work attendance.","causes":["Female Anopheles mosquitoes","Warm wet climate","Stagnant water","Poverty","Poor housing","Weak healthcare","Limited nets and medicine"],"impacts":["Children miss school","Adults miss work","Treatment costs","Lower productivity","Poverty cycle","Pressure on health services"],"responses":["Insecticide-treated bed nets","Indoor residual spraying","Rapid tests","ACT medicines","Vaccines RTS,S/R21","Draining stagnant water","Education campaigns"],"stats":["about 250 million+ malaria cases globally each year","about 94% of cases/deaths occur in Sub-Saharan Africa","children under 5 are about 80% of deaths","Nigeria loses about US$1b/year"],"gold":"Malaria is both a cause and consequence of underdevelopment.","prob":99,"probReason":"Top predicted health/malaria case."},{"topic":"Development + LICs","subtopic":"LICs & Inequality","name":"NZ wealth inequality","location":"New Zealand, a high-income country.","problem":"A country can be high income but still have serious internal inequality.","causes":["Property wealth","Trusts and asset ownership","Uneven income and opportunity","Limited redistribution"],"impacts":["Housing inequality","Lower social mobility","Education and health gaps","Fair-go image challenged"],"responses":["Redistribution debate","Housing policy","Better access to education and health","Tax and trust policy debate"],"stats":["Top 10% own 59% wealth","Bottom 50% own 2%","Top 1% typical net worth about $6.2m","Median NZer about $92k"],"gold":"HDI can hide internal inequalities, so geographers also use Gini and wealth data.","prob":86,"probReason":"Useful development/inequality source case."},{"topic":"Development + LICs","subtopic":"LICs & Inequality","name":"Brazil favelas topic":"Development + LICs","subtopic":"Development","marks":4,"q":"Compare development in New Zealand and Ethiopia.","model":"Both countries have seen improvements in infrastructure and services. However, New Zealand has high literacy, high water access, life expectancy about 82 years and a diverse economy, while Ethiopia has more small-scale farming, lower secondary attendance and life expectancy about 66 years. The gap reflects differences in income, healthcare, education and infrastructure.","critical":false,"checks":["Similarity included.","NZ evidence: HIC, high life expectancy/water/literacy/diverse economy.","Ethiopia evidence: LIC, farming, lower attendance or life expectancy around 66.","Explains reason for the development gap."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R67","topic":"Development + LICs","subtopic":"Development","marks":4,"q":"Explain how girls' education can help development.","model":"Girls' education improves literacy, skills and job opportunities. Educated women are more likely to earn income, make informed health choices and have smaller, healthier families. This raises productivity and improves child health across generations, increasing living standards.","critical":false,"checks":["Point: education improves skills/literacy/jobs.","Mentions girls/women specifically.","Explains health, family size or child outcomes.","Links to income/productivity/living standards."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R68","topic":"Development + LICs","subtopic":"LICs & Inequality","marks":4,"q":"Explain how colonialism contributed to global inequality today.","model":"Colonial powers extracted resources and built infrastructure mainly to export goods, not to develop local people. Many colonies were left with weak schools, hospitals and industries. This created trade patterns where former colonies exported cheap raw materials and depended on richer countries, helping explain inequality today.","critical":false,"checks":["Colonial extraction of resources.","Infrastructure served colonial export interests.","Weak schools/hospitals/industries or lack of diversification.","Links to raw-material dependence and global inequality today."],"prob":98,"probReason":"Very likely: LIC income, exports and low-value trade."},{"id":"R69","topic":"Development + LICs","subtopic":"LICs & Inequality","marks":5,"q":"Human factors matter more than physical factors in causing inequality. Do you agree?","model":"I mostly agree because human factors decide whether countries use resources well or overcome physical challenges. Norway has harsh conditions but strong governance, while the DRC has valuable cobalt but conflict and corruption reduce benefits. Physical factors such as drought or being landlocked matter, but education, infrastructure and stability can reduce their impact. Therefore, human factors are often more decisive.","critical":false,"checks":["Judgement: agree/partly agree/disagree.","Human factor evidence: governance, conflict, colonialism, education, infrastructure or trade.","Physical factor evidence: climate, landlocked, hazards, resources or soils.","Example such as Norway, DRC, Sahel or South Sudan.","Final verdict linked to development."],"prob":98,"probReason":"Very likely: LIC income, exports and low-value trade."},{"id":"R70","topic":"Development + LICs","subtopic":"LICs & Inequality","marks":4,"q":"Compare internal inequality in Brazil and New Zealand.","model":"Both have significant internal inequality despite different income levels. In Brazil, inequality is visible through favelas beside wealthy apartments and gaps in housing, schools and safety. In New Zealand it is less visible but serious: top 10% own 59% of wealth and bottom 50% own 2%. Brazil links to colonial land ownership while NZ links to property wealth and trusts.","critical":false,"checks":["Similarity: both have internal inequality.","Brazil evidence: favelas/visible urban inequality/service gaps.","NZ evidence: top 10% 59%, bottom 50% 2%, property/trusts.","Explains difference in causes or visibility."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R71","topic":"Food","subtopic":"Food Security","marks":4,"q":"Explain why Malthus's predictions did not come true in the 20th century.","model":"The Green Revolution proved technology could outpace population growth. HYVs of wheat and rice, irrigation and fertilisers increased yields. Global cereal production rose 3.5× since 1961 while population rose 2.6×, so food production grew faster than Malthus expected.","critical":false,"checks":["Mentions Green Revolution/technology.","Explains HYVs, irrigation, fertilisers or yield growth.","Uses statistic: production 3.5× vs population 2.6×.","Links to Malthus being wrong about timeline/food growth."],"prob":95,"probReason":"Useful supporting textbook item."},{"id":"R72","topic":"Food","subtopic":"Food Security","marks":7,"q":"Malthus argued famine is inevitable. To what extent do you agree?","model":"I partly agree because Malthus was right that population growth and resource limits can create pressure. Neo-Malthusians point to climate change, soil degradation and water stress, with population heading towards about 11 billion by 2100. However, the Green Revolution disproved his timeline because cereal production rose 3.5× since 1961 while population rose 2.6×. The real problem today is often access, conflict, distribution and waste, as about one third of food is wasted. Therefore famine is not inevitable, but avoiding it requires sustainable production, fair access and good governance.","critical":false,"checks":["Judgement: partly agree/disagree.","Malthus/Neo-Malthus side: resource limits, climate, water, soil or 11b.","Anti-Malthus evidence: Green Revolution, 3.5× vs 2.6×.","Modern nuance: access, conflict, distribution or one-third waste.","Final verdict: famine not inevitable but risk remains."],"prob":95,"probReason":"High value: teacher note stresses PEEL/writing and source-style answers."},{"id":"R73","topic":"Food","subtopic":"Food Security","marks":4,"q":"Explain why food waste matters for food security.","model":"About one third of food produced globally is wasted. In LICs, lack of cold storage and transport means crops may be lost before markets. Reducing waste increases effective food supply without clearing more land, using more water or producing more emissions, making it a sustainable way to improve food security.","critical":false,"checks":["Uses one-third food waste statistic.","Explains LIC storage/transport loss or waste at some stage.","Shows reducing waste increases effective supply.","Links to sustainability: land, water or emissions."],"prob":95,"probReason":"Useful supporting textbook item."},{"id":"R74","topic":"Food","subtopic":"Food Security","marks":5,"q":"Technology is the most important solution to food insecurity. To what extent do you agree?","model":"I partly agree because technology such as HYVs, irrigation, precision farming and storage can increase food production. The Green Revolution helped cereal production rise faster than population. However, Yemen and Sudan show that conflict, poverty, blocked aid and weak access can cause hunger even when food exists. Therefore, technology helps but must be combined with peace, fair access, reduced waste and good governance.","critical":false,"checks":["Judgement: partly agree/disagree.","Technology evidence: HYVs, irrigation, storage, Green Revolution or precision farming.","Counterpoint: conflict, poverty, access, waste or governance.","Named example: Yemen, Sudan, Sahel or Green Revolution.","Final verdict: technology helps but is not enough alone."],"prob":99,"probReason":"Very likely: food shortage case with conflict, consequences and solutions."},{"id":"R75","topic":"Food","subtopic":"Food Case Studies","marks":5,"q":"Explain why conflict is the biggest cause of food insecurity in Yemen.","model":"Conflict damages food production, transport and imports. In Yemen, war has damaged farms, roads, ports and markets, while fuel shortages stop irrigation and food transport. Hudaydah port operating at reduced capacity restricts imports and GDP collapse makes food unaffordable. Conflict also worsens health and aid delivery. Therefore it is the biggest cause because it disrupts availability, access and utilisation.","critical":false,"checks":["Point: conflict is the main/biggest cause.","Availability: farms/production/imports damaged.","Access: ports/roads/fuel/prices/GDP affect affordability and transport.","Utilisation/health/aid issue mentioned.","Final link to all food-security pillars or development impact."],"prob":99,"probReason":"Very likely: food shortage case with conflict, consequences and solutions."},{"id":"R76","topic":"Food","subtopic":"Food Case Studies","marks":6,"q":"Compare the causes of food insecurity in Yemen and Sudan/South Sudan.","model":"Both are mainly conflict-driven. Yemen's civil war since 2015 and Sudan's SAF–RSF conflict since April 2023 have damaged farms, markets and aid access. Both also face economic collapse, with Yemen's real GDP per capita down nearly 60% and Sudan food prices up 60%+. A difference is Yemen's extreme water scarcity and dependence on Hudaydah port, while Sudan/South Sudan face larger displacement and climate shocks such as floods and droughts. Overall, both crises are conflict-driven but differ in geography and scale.","critical":false,"checks":["Similarity: conflict as root cause in both.","Similarity: economic collapse/prices/aid access.","Yemen-specific difference: water scarcity, GDP, Hudaydah port or 2015 war.","Sudan/South Sudan-specific difference: 7m+ displaced, climate shocks, food prices, 18m/7m food insecure.","Final comparative judgement."],"prob":99,"probReason":"Very likely: food shortage case with conflict, consequences and solutions."},{"id":"R77","topic":"Food","subtopic":"Food Case Studies","marks":6,"q":"Climate is more important than conflict in causing food shortages. To what extent do you agree?","model":"I partly disagree because climate and conflict often work together, but conflict can be more damaging in places like Yemen and Sudan. Droughts, floods and low rainfall reduce harvests, especially in the Sahel. However, conflict destroys farms, roads, ports and markets, blocks aid and forces people to flee, so people cannot grow or buy food even when food exists elsewhere. Therefore climate is important, but conflict is often stronger because it turns environmental stress into a full food crisis.","critical":false,"checks":["Judgement: partly agree/disagree.","Climate side: drought, floods, low rainfall, Sahel or harvests.","Conflict side: farms, roads, ports, markets, aid or displacement.","Named examples: Yemen/Sudan/Sahel.","Final verdict weighing conflict vs climate."],"prob":99,"probReason":"Very likely: food shortage case with conflict, consequences and solutions."},{"id":"R78","topic":"Food","subtopic":"Food Case Studies","marks":5,"q":"Emergency food aid is the most effective response to food insecurity. Do you agree?","model":"Emergency food aid is vital because it prevents deaths during crises. WFP aid and UNICEF nutrition programmes can immediately support people in Yemen, Sudan and South Sudan. However, aid cannot fix conflict, damaged ports, poverty, desertification or poor irrigation. In Yemen, aid can also be blocked or underfunded. Therefore emergency aid is necessary but not sufficient; long-term solutions need peace, infrastructure, irrigation, drought-resistant crops and sustainable farming.","critical":false,"checks":["Judgement: aid is vital but limited.","Explains short-term benefit of aid/nutrition support.","Explains limitation: conflict, blocked aid, underfunding or symptoms not causes.","Long-term responses: peace, irrigation, seeds, infrastructure, sustainable farming.","Final verdict: necessary but not sufficient."],"prob":99,"probReason":"Very likely: food shortage case with conflict, consequences and solutions."},{"id":"R79","topic":"Water","subtopic":"Water","marks":4,"q":"Using water access data, describe the pattern and explain two reasons.","model":"Water access is highest in HICs, moderate in MICs and lowest in LICs. Norway has 100% and NZ 95.6%, while Nigeria has 23.7% and Ethiopia 12%, an 88 percentage-point gap between Norway and Ethiopia. HICs have more money for pipes, pumps and treatment plants, while LICs may face poverty, conflict or weak governance that limits investment.","critical":false,"checks":["Pattern: HIC high, MIC moderate, LIC low.","Uses exact data: Norway/NZ/Nigeria/Ethiopia and ideally 88-point gap.","Reason 1: income/infrastructure/treatment systems.","Reason 2: governance, conflict, corruption or poverty.","Explains development impact if aiming top marks."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R80","topic":"Water","subtopic":"Water","marks":4,"q":"Explain how lack of safe water limits development in LICs.","model":"Lack of safe water spreads diseases such as cholera and diarrhoea, causing children to miss school and adults to miss work. Girls may also miss education because they collect water. Farmers cannot irrigate crops reliably, reducing food security and income. This lowers health, education and standard of living, reducing HDI.","critical":false,"checks":["Health: water-borne disease.","Education/gender: children or girls miss school/collect water.","Economy/farming: irrigation, work or income affected.","Links to HDI/quality of life/development."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R81","topic":"Water","subtopic":"Water","marks":6,"q":"Water is more likely to cause conflict than cooperation. To what extent do you agree?","model":"I partly agree because shared rivers can create tension when upstream and downstream countries want different things. Ethiopia wants GERD for electricity and development, while Egypt depends on the Nile for about 95% of its freshwater and fears reduced flow. However, water can also encourage cooperation through data sharing, agreed dam releases, drought rules and regional power trade. Therefore, water can cause conflict, but good management can turn it into cooperation.","critical":false,"checks":["Judgement: partly agree/disagree.","Conflict side: shared river/upstream-downstream tension.","Case evidence: GERD, Ethiopia, Egypt, Nile or 95%.","Cooperation side: data sharing, releases, drought rules, power trade.","Final verdict linked to development/security."],"prob":98,"probReason":"Very likely: water conflict/cooperation case."},{"id":"R82","topic":"Trade","subtopic":"Trade","marks":4,"q":"Explain how China has benefited from global trade. Use evidence.","model":"Since the 1980s China became a major exporter of electronics, machinery and clothing. Cheap labour, government investment and foreign factories created jobs, increased GDP per capita and lifted 800 million+ people from poverty. However, pollution, long hours and urban-rural inequality remain challenges.","critical":false,"checks":["China became major exporter.","Mechanism: cheap labour, investment, factories or infrastructure.","Evidence: 800m+ lifted from poverty or GDP growth.","Nuance: pollution, labour conditions or inequality."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R83","topic":"Trade","subtopic":"Trade","marks":5,"q":"What happened at Rana Plaza and why does it matter?","model":"On 24 April 2013, an 8-storey garment building in Savar, Bangladesh collapsed, killing 1,134 workers and injuring 2,500+. Workers had seen cracks but were forced back to work. It matters because it exposed the unsafe conditions behind cheap fast fashion and led to reforms such as the Bangladesh Accord, 1,600+ factories covered and over 2,000 inspections.","critical":false,"checks":["What happened: building collapse in Bangladesh/Savar.","Uses data: 24 Apr 2013, 1,134 killed, 2,500+ injured.","Cause/issue: cracks, unsafe building, forced workers or low worker power.","Why it matters: exposed fast-fashion inequality/unsafe supply chains.","Response/evidence: Accord, inspections, 1,600+ factories or labour reforms."],"prob":98,"probReason":"Very likely: trade case and worker-rights example."},{"id":"R84","topic":"Trade","subtopic":"Trade","marks":4,"q":"Describe the trend in Rana Plaza data since 2013. What does it suggest?","model":"Factory inspections rose from under 100 to over 2,000, factories covered by safety agreements rose from 0 to 1,600+, and wages rose from US$38 to US$75/month. This shows real safety progress, but wages are still far below a living wage and worker power remains limited, so progress is uneven.","critical":false,"checks":["Uses inspection trend: <100 to >2,000.","Uses Accord/factories trend: 0 to 1,600+ or wages 38 to 75.","Explains progress in safety/reform.","Explains remaining inequality/low wages/worker power."],"prob":98,"probReason":"Very likely: trade case and worker-rights example."},{"id":"R85","topic":"Trade","subtopic":"Trade","marks":4,"q":"Give one strength and one weakness of the WTO.","model":"A strength of the WTO is that it provides rules and dispute settlement, helping countries trade more peacefully. A weakness is that it can favour richer countries because EU and USA subsidies make their exports cheaper, undercutting LIC farmers, while LICs have less power to protect their industries.","critical":false,"checks":["Strength: rules/dispute settlement/market access/stability.","Weakness: favours rich countries or subsidies.","Example: EU/USA subsidies undercut LIC farmers or WTO limits LIC protection.","Balanced answer."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R86","topic":"Trade","subtopic":"Trade","marks":7,"q":"Global trade benefits rich countries more than poor countries. To what extent do you agree?","model":"I mostly agree because rich countries own brands, technology and trade rules, so they capture more value. The DRC exports cobalt for phones and EVs but remains poor due to conflict and corruption. Bangladeshi garment workers earn low wages making clothes sold for high prices. However, trade has helped China lift 800m+ people from poverty and Vietnam reduce poverty from about 70% to under 6%. Therefore trade currently benefits rich countries more, but poorer countries can benefit if they move up the value chain and invest in education, infrastructure and good governance.","critical":false,"checks":["Judgement: mostly/partly agree.","Agree evidence: rich countries own brands/technology/rules or subsidies.","Poor-country example: DRC cobalt/resource curse or Bangladesh/Rana Plaza.","Counterexample: China and/or Vietnam benefited.","Nuance: value chain, governance, education or infrastructure.","Final verdict."],"prob":98,"probReason":"Very likely: LIC income, exports and low-value trade."},{"id":"R87","topic":"Health + Malaria","subtopic":"Health","marks":4,"q":"Explain how poor health can create a poverty cycle.","model":"Poor health causes children to miss school and adults to miss work. Families spend money on treatment instead of food, savings or education. This lowers income and future opportunities, making it harder to afford healthcare, nutritious food or prevention. Therefore poverty and poor health reinforce each other.","critical":false,"checks":["Poor health causes missed school/work.","Treatment costs reduce money for food/education/savings.","Lower income/opportunities result.","Explains feedback/vicious cycle."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R88","topic":"Health + Malaria","subtopic":"Health","marks":4,"q":"Choose three SDGs and explain how they are connected.","model":"SDG 6 Clean Water supports SDG 3 Good Health because safe water reduces disease. Better health supports SDG 4 Quality Education because children attend school more often. Clean water also supports SDG 5 Gender Equality because girls spend less time collecting water and more time learning. These goals reinforce each other.","critical":false,"checks":["Names three relevant SDGs.","Explains link 1, e.g. water → health.","Explains link 2, e.g. health → education or water → gender.","Shows interconnection/reinforcement."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R89","topic":"Health + Malaria","subtopic":"Health","marks":6,"q":"Global inequality can never be fully eliminated. To what extent do you agree?","model":"I partly agree because colonial legacies, unfair trade rules, conflict and climate change are powerful barriers. Even HICs such as New Zealand have internal inequality, with the top 10% owning 59% of wealth. However, inequality can be reduced: China lifted 800m+ people from poverty and Vietnam's poverty fell sharply through export-led growth. Therefore full elimination may be unlikely, but major reduction is possible through education, healthcare, fair trade, good governance and climate adaptation.","critical":false,"checks":["Judgement: partly agree/disagree.","Agree side: colonialism, unfair trade, conflict, climate or internal inequality.","Evidence: NZ 59% or another inequality statistic.","Disagree side: China/Vietnam/child mortality or progress example.","Solutions: education, healthcare, fair trade, governance, climate adaptation.","Final verdict: elimination unlikely but reduction possible."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R90","topic":"Health + Malaria","subtopic":"Malaria","marks":5,"q":"Explain why malaria is both a cause and consequence of underdevelopment.","model":"Malaria is a cause of underdevelopment because it makes children miss school, adults miss work and families spend money on treatment, reducing income and HDI. It is also a consequence because poverty limits bed nets, medicine, strong housing and healthcare. In Sub-Saharan Africa, warm wet conditions and poverty allow malaria to persist. Therefore malaria creates a vicious cycle of poor health and low income.","critical":false,"checks":["Cause side: school absence, work absence, treatment costs or productivity loss.","Consequence side: poverty limits nets, medicine, housing or healthcare.","Named place/evidence: Sub-Saharan Africa, Nigeria, WHO data or children under 5.","Uses vicious cycle idea.","Links to development: income, HDI, education or quality of life."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R91","topic":"Health + Malaria","subtopic":"Malaria","marks":5,"q":"Malaria slows development in affected countries. Explain why.","model":"Malaria slows development because it damages health, productivity, education and income at the same time. In Sub-Saharan Africa, many children miss school and adults miss work because of illness. Families spend money on treatment and countries lose productivity, such as Nigeria losing about US$1b/year. Therefore, malaria traps communities in a cycle of poor health and low income.","critical":false,"checks":["Point: malaria slows development.","Impacts health and/or deaths.","Impacts education: school absence or cognitive development.","Impacts economy: work absence, treatment costs, productivity or Nigeria US$1b.","Final link to poverty cycle/development."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R92","topic":"Health + Malaria","subtopic":"Malaria","marks":4,"q":"Why is there no single solution to malaria?","model":"Malaria persists because climate, stagnant water, poverty, housing, healthcare access and resistance all interact. Bed nets help, but they do not treat infected people. Medicines treat cases, but reinfection can occur if mosquitoes keep breeding. Therefore an integrated approach is needed: ITNs, spraying, rapid tests, ACT medicines, vaccines, education and drainage.","critical":false,"checks":["Explains multiple causes interact.","Mentions limitation of one solution.","Names several responses: nets, spraying, tests, medicines, vaccines, drainage, education.","Concludes integrated approach needed."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R93","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":4,"q":"Improve this weak answer: 'Water is important because people need it.'","model":"Water is essential for development because clean water reduces disease and supports farming. For example, safe water reduces cholera and diarrhoea, so children miss fewer school days and adults can work more. It also supports irrigation and food security. Therefore, water improves health, education, income and quality of life.","critical":false,"checks":["Clear point linked to development.","Evidence/example: disease, cholera/diarrhoea, farming or irrigation.","Explanation: school/work/food security impact.","Link: health, education, income or quality of life."],"prob":97,"probReason":"High value: core development definitions and indicators."},{"id":"R94","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":3,"q":"Suggest one limitation of a source about inequality.","model":"A source may only show wealth distribution and not explain causes, changes over time, regional differences or different groups. It may also use national averages that hide internal variation, so it gives an incomplete picture.","critical":false,"checks":["Identifies limitation: one snapshot, averages, missing groups, no causes or no time change.","Explains why that limits interpretation.","Uses inequality/source language."],"prob":95,"probReason":"High value: teacher note stresses PEEL/writing and source-style answers."},{"id":"R95","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":4,"q":"Describe a graph trend about cereal production and population since 1961.","model":"Cereal production has increased faster than population since 1961. Most growth came from higher yields rather than more land. This suggests technology improved food availability and disproved Malthus's simple prediction, but access and sustainability still matter.","critical":false,"checks":["Describes trend: production increased faster than population.","Mentions yields/land/technology.","Links to Malthus or food availability.","Adds nuance: access/sustainability still matter."],"prob":95,"probReason":"High value: teacher note stresses PEEL/writing and source-style answers."},{"id":"R96","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":4,"q":"What does a NZ inequality source show if richest 10% own 59% and poorest 50% own 2%?","model":"It shows wealth is very unevenly distributed. The richest 10% own most wealth while the poorest half own almost none. This gap can affect housing, education, health and social mobility, showing that a high-income country can still have development problems.","critical":false,"checks":["Uses exact data: 10%/59% and 50%/2%.","Describes inequality/uneven distribution.","Explains impact: housing, education, health or mobility.","Links to development/HDI limitation."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R109","topic":"Development + LICs","subtopic":"Population/DTM","marks":4,"q":"Compare New Zealand and Ethiopia using the DTM.","model":"New Zealand is in Stage 4 or moving towards Stage 5 because it has low birth and death rates, high life expectancy and an ageing population. Ethiopia is moving from Stage 2 to Stage 3 because death rates have fallen due to healthcare and sanitation improvements, but birth rates remain relatively high. This shows different development pathways and different pressure on services.","critical":false,"checks":["Places NZ in Stage 4/5 with low birth/death rates.","Places Ethiopia in Stage 2/3 with falling death rate and high/falling birth rate.","Explains reasons: healthcare, sanitation, education/family planning or ageing.","Links to development pathways or pressure on services."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R110","topic":"Development + LICs","subtopic":"Development","marks":4,"q":"Explain why development is a journey, not a label, using New Zealand and Ethiopia.","model":"Development is a journey because countries change over time as policies, trade, technology, environment and governance change. New Zealand is highly developed but still faces housing inequality and freshwater pressure. Ethiopia has lower income but has improved roads, schools and clinics over recent decades. Therefore, countries are not fixed as rich or poor; their development pathways can improve or regress.","critical":false,"checks":["Defines development as changing over time.","Uses New Zealand example, including remaining challenges.","Uses Ethiopia example, including improvement or remaining barriers.","Concludes that development pathways are dynamic, not fixed labels."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R111","topic":"Development + LICs","subtopic":"LICs & Inequality","marks":4,"q":"Explain why internal inequality can exist inside a high-income country.","model":"High-income countries can have high average wealth but unequal distribution. In New Zealand, the top 10% own 59% of wealth while the bottom 50% own only 2%. Property ownership, trusts, education access and regional differences mean some groups have more opportunity than others. Therefore, HDI and GDP can hide inequality within a country.","critical":false,"checks":["Explains average wealth can hide unequal distribution.","Uses NZ data: top 10% 59% and bottom 50% 2%.","Explains causes such as property, trusts, education or regional differences.","Links to GDP/HDI limitations or development."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R112","topic":"Development + LICs","subtopic":"LICs & Inequality","marks":6,"q":"Can global inequalities ever be reduced? To what extent do you agree?","model":"I agree that global inequalities can be reduced, but not easily eliminated. China and Vietnam show that trade, education, infrastructure and industrial growth can cut poverty dramatically. However, conflict, climate change, colonial legacies, debt and unfair trade rules keep many LICs behind. Even HICs such as New Zealand have internal inequality, with the top 10% owning 59% of wealth. Therefore, inequality can be reduced through fair trade, governance, healthcare, education and climate adaptation, but total elimination is unlikely.","critical":false,"checks":["Judgement on extent/reduction vs elimination.","Evidence that inequality can reduce: China/Vietnam/trade/education/infrastructure.","Barriers: conflict, climate, colonialism, debt or unfair trade.","Uses internal inequality evidence such as NZ 59% statistic.","Clear final verdict with solutions."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R113","topic":"Trade","subtopic":"Trade","marks":4,"q":"Explain why some countries are left behind by global trade.","model":"Some countries remain stuck exporting low-value raw materials such as cocoa, coffee, cotton or minerals. Prices are unstable and most profit is made when richer countries process goods into manufactured products. Poor infrastructure, conflict, debt and trade barriers also make it hard to compete. Therefore, trade can leave LICs dependent and unequal unless they move up the value chain.","critical":false,"checks":["Mentions low-value raw-material exports.","Explains unstable prices or profit captured by richer countries.","Mentions barriers: infrastructure, conflict, debt, trade barriers or transport costs.","Links to dependence/inequality/value chain."],"prob":98,"probReason":"Very likely: LIC income, exports and low-value trade."},{"id":"R114","topic":"Trade","subtopic":"Trade","marks":6,"q":"Should there be global rules to make trade fairer, or should countries compete freely?","model":"There should be stronger rules to make trade fairer because free competition often favours richer countries with better technology, brands and subsidies. The WTO can help by settling disputes, but critics argue EU and USA subsidies undercut LIC farmers. Fairtrade and supply-chain transparency can protect producers, while workers also need living wages and safety rules. However, too many rules could reduce competitiveness. Overall, fairer rules are needed so trade supports development rather than exploitation.","critical":false,"checks":["Judgement: fairer rules vs free competition.","Explains why free competition can favour rich countries.","Uses WTO/subsidies or Fairtrade evidence.","Mentions producers/workers, living wages, safety or transparency.","Balanced counterpoint and final verdict."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R115","topic":"Water","subtopic":"Water","marks":4,"q":"Explain how improved water access can support gender equality.","model":"In many LIC communities, women and girls spend hours collecting water. If safe water is nearby, girls miss fewer school hours and women have more time for paid work or childcare. Clean water also reduces disease, improving attendance and productivity. Therefore, water access supports gender equality as well as health, education and income.","critical":false,"checks":["Women/girls collect water.","Improved access frees time for school or work.","Links clean water to disease reduction/attendance/productivity.","Connects to gender equality and development."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R116","topic":"Food","subtopic":"Food Security","marks":4,"q":"Explain how future food innovations could help and what risks they may bring.","model":"Future innovations such as genetic modification, improved storage, precision farming and better irrigation could increase yields, reduce post-harvest loss and make crops more resilient to drought. However, they may be expensive for small farmers and could bring environmental risks such as biodiversity loss or resistance problems if poorly managed. Therefore, innovation helps, but it must be combined with fair access and good governance.","critical":false,"checks":["Names innovations: GM, storage, precision farming, irrigation or resilient crops.","Explains benefit: yields, lower waste, drought resilience or food security.","Explains risk: cost, inequality, environmental damage, resistance or biodiversity loss.","Balanced conclusion with access/governance."],"prob":95,"probReason":"Useful supporting textbook item."},{"id":"R117","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":4,"q":"A graph shows factory inspections rose from under 100 before 2013 to over 2,000 after Rana Plaza. Describe the trend and suggest what it means.","model":"Factory inspections increased sharply after the Rana Plaza collapse, from fewer than 100 to over 2,000. This suggests the disaster triggered major safety reforms and closer monitoring of garment factories. However, inspections alone do not prove workers are paid fairly, so the data shows safety progress but not full equality.","critical":false,"checks":["Describes trend with exact data: <100 to >2,000.","Links trend to Rana Plaza/safety reforms/monitoring.","Explains what it means for worker safety or accountability.","Adds limitation: wages, enforcement or equality not fully shown."],"prob":98,"probReason":"Very likely: trade case and worker-rights example."},{"id":"R118","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":4,"q":"A source gives one national average for HDI. Suggest two limitations.","model":"A national HDI average may hide internal inequality between regions, genders or ethnic groups. It also may not show environmental quality, political freedom or how wealth is distributed. Therefore, it should be used with other indicators such as Gini, regional maps or source evidence.","critical":false,"checks":["Limitation 1: hides internal/regional/gender inequality.","Limitation 2: misses environment, freedom or wealth distribution.","Explains why this affects interpretation.","Suggests using Gini/maps/other indicators."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R119","topic":"PEEL + Source","subtopic":"Command Words","marks":4,"q":"Rewrite this weak source answer: 'Ethiopia has bad water and Norway has good water.'","model":"The source shows a clear link between income level and safe water access. Norway, a HIC, has 100% safe water access, while Ethiopia, a LIC, has only 12%, creating an 88 percentage-point gap. This suggests richer countries can invest more in pipes, pumps and treatment plants, while poorer countries face economic water scarcity.","critical":false,"checks":["Uses precise pattern, not vague words.","Quotes Norway 100% and Ethiopia 12%.","Calculates or states the 88 percentage-point gap.","Explains income/infrastructure/economic water scarcity."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R129","topic":"PEEL + Source","subtopic":"PEEL & Source Skills","marks":5,"q":"Using source data, describe the pattern and suggest one limitation.","model":"The source shows a clear pattern, with higher-income countries having better access or outcomes than lower-income countries. A strong answer should quote exact data, such as the highest and lowest values, and name places. One limitation is that the source may only show one year or national averages, so it may hide regional, gender or wealth differences.","critical":true,"checks":["Describes an overall pattern or trend.","Uses at least two exact data points or named places.","Explains what the pattern suggests.","Gives one valid limitation, such as one-year data, national averages or missing groups.","Keeps description and explanation separate."],"prob":97,"probReason":"High value: teacher note stresses PEEL/writing and source-style answers."},{"id":"R130","topic":"Health + Malaria","subtopic":"Malaria","marks":6,"q":"Which malaria response is most effective? Evaluate.","model":"Insecticide-treated bed nets are very effective because they are cheap and prevent mosquito bites while people sleep, especially in remote LIC communities. However, no single solution is enough. Spraying reduces mosquitoes indoors, rapid tests and ACT medicines treat cases, vaccines protect young children, and drainage reduces breeding sites. Therefore, bed nets may be the best first response, but an integrated strategy is most effective overall.","critical":true,"checks":["Makes a judgement about the most effective response.","Explains why one response works, such as ITNs being cheap/preventive.","Considers at least two other responses.","Explains why no single solution is enough.","Links to LIC access, health, cost or development.","Gives a final evaluated verdict."],"prob":99,"probReason":"Very likely: teacher note explicitly names malaria and health."},{"id":"R131","topic":"Development + LICs","subtopic":"Development","marks":6,"q":"Compare New Zealand and Ethiopia using development indicators and DTM.","model":"New Zealand is more developed because it has very high HDI, high water access, high life expectancy and a service-based economy. It is Stage 4 or moving towards Stage 5 of the DTM, with low birth and death rates and an ageing population. Ethiopia has a lower HDI, lower water access and more dependence on farming. It is moving from Stage 2 to Stage 3, with falling death rates but still relatively high birth rates. This shows development is a pathway, not a fixed label.","critical":false,"checks":["Uses New Zealand evidence: high HDI, water access, life expectancy or service economy.","Uses Ethiopia evidence: lower HDI, water access, farming or health/education limits.","Correctly links NZ to DTM Stage 4/5.","Correctly links Ethiopia to DTM Stage 2/3.","Compares both countries rather than writing two separate descriptions.","Links comparison to development pathway/quality of life."],"prob":98,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R132","topic":"Trade","subtopic":"Trade","marks":6,"q":"Trade is the best way for LICs to develop. To what extent do you agree?","model":"I partly agree because trade can create jobs, export income and tax revenue. China and Vietnam show that export-led growth can reduce poverty. However, trade can also keep LICs unequal if they export low-value raw materials, face unstable prices or workers are paid low wages. Rana Plaza and the DRC show that trade without safety, fair wages and value-added industry can limit development. Therefore, trade is important but only works well with education, infrastructure, governance and fairer supply chains.","critical":true,"checks":["Clear judgement: partly agree/disagree.","Explains how trade helps: jobs, exports, tax revenue or investment.","Uses a positive example such as China or Vietnam.","Explains trade limits: raw materials, low wages, unstable prices or unsafe work.","Uses a negative example such as Rana Plaza or DRC.","Final verdict includes conditions for trade-led development."],"prob":99,"probReason":"Very likely: trade case and worker-rights example."},{"id":"R133","topic":"Extra Revision","subtopic":"SDGs","marks":5,"q":"Explain how three SDGs are connected using water, health and education.","model":"SDG 6 Clean Water supports SDG 3 Good Health because safe water reduces diseases such as cholera and diarrhoea. Better health supports SDG 4 Quality Education because children miss fewer school days. Clean water can also support SDG 5 Gender Equality because girls spend less time collecting water and more time in school. This shows development goals reinforce each other.","critical":false,"checks":["Names SDG 6 Clean Water.","Names SDG 3 Good Health.","Names SDG 4 Education or SDG 5 Gender Equality.","Explains at least two links between goals.","Ends with the idea that SDGs reinforce each other."],"prob":97,"probReason":"High value: core development definitions and indicators."},{"id":"R152","topic":"Development + LICs","subtopic":"Global Patterns","marks":5,"q":"Explain why development is uneven across the world.","model":"Development is uneven because physical and human causes interact. Physical factors such as drought, flooding, landlocked location, hazards and poor soils can limit farming, trade and infrastructure. Human factors such as colonialism, raw-material trade, weak governance, corruption and conflict can reduce investment in education and health. However, good governance, fertile land, trade access and infrastructure can support development. Therefore, uneven development is caused by a combination of geography, history, trade and politics.","critical":true,"checks":["Mentions at least two physical factors such as climate, landlocked location, hazards or soils.","Mentions at least two human factors such as colonialism, trade structure, governance, corruption or conflict.","Explains how these affect income, infrastructure, health or education.","Shows interaction rather than listing separate factors.","Final link to uneven development or quality of life."],"prob":99,"probReason":"Very likely: LIC income, exports and low-value trade."},{"id":"R153","topic":"Development + LICs","subtopic":"Inequality NZ/Brazil","marks":5,"q":"Are inequalities only between countries? Use New Zealand or Brazil.","model":"Inequalities are not only between countries because large gaps can exist inside one country. In New Zealand, the top 10% own 59% of wealth while the bottom 50% own only 2%, affecting housing, education and opportunity. In Brazil, favelas beside wealthier urban areas show visible gaps in housing, sanitation and safety. Therefore, national averages such as HDI can hide internal inequality.","critical":true,"checks":["Clear point: inequalities can exist within countries.","Uses NZ evidence such as top 10% 59% / bottom 50% 2% or housing opportunity.","Uses Brazil/favelas or another internal inequality example.","Explains effects on housing, education, health, safety or opportunity.","Links to limitation of national averages/HDI."],"prob":99,"probReason":"Very likely: teacher note asks why LIC income is low and how countries earn money."},{"id":"R154","topic":"Food","subtopic":"Food Technology","marks":5,"q":"Can technology solve the world's food crisis? Use evidence.","model":"Technology can help by increasing production through HYVs, irrigation, precision farming, drought-resistant crops and better storage. The Green Revolution showed yields can rise faster than population. However, the food crisis is also caused by conflict, poverty, poor access, waste and climate shocks. Yemen and Sudan show that people can go hungry because roads, ports, markets and aid are blocked, not simply because food does not exist. Therefore, technology helps but cannot solve the crisis alone.","critical":true,"checks":["Explains how technology can increase production or reduce losses.","Uses evidence such as Green Revolution, HYVs, irrigation or storage.","Explains non-techn function load(){try{let raw=localStorage.getItem("y10geoExamProgress");if(raw)return JSON.parse(raw);for(let i=LEGACY_KEYS.length-1;i>=0;i--){let old=localStorage.getItem(LEGACY_KEYS[i]);if(old){localStorage.setItem("y10geoExamProgress",old);return JSON.parse(old)}}return{attempts:[]}}catch{return{attempts:[]}}}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function norm(s){return String(s||"").toLowerCase().replace(/quality of living/g,"quality of life").replace(/[^a-z0-9% ]/g," ").split(" ").filter(Boolean).join(" ")}
function allQ(){return [...DATA.auto,...DATA.rubric]}
function isTeacher(q){return q.topic!=="Extra Revision"}
function probClass(x){let p=x?.prob||0;return p>=92?"vh":p>=80?"h":p>=65?"m":""}
function probBadge(x){let p=x?.prob||0;let label=p>=92?"Very high":p>=80?"High":p>=65?"Medium":"Backup";return `<span class="prob ${probClass(x)}">${label} priority</span>`}
function sortPred(list){return [...list].sort((a,b)=>(b.prob||0)-(a.prob||0) || String(a.id||a.name).localeCompare(String(b.id||b.name)))}
function sortedCases(){return sortPred(DATA.cases)}
function byId(id){return allQ().find(q=>q.id===id)}
function attemptsById(){let by={};(progress.attempts||[]).forEach(a=>{by[a.qid]??={count:0,best:0};by[a.qid].count++;by[a.qid].best=Math.max(by[a.qid].best,a.percent||0)});return by}
function pick(kind){let pool=sortPred(allQ().filter(q=>isTeacher(q) && (kind==="auto"?DATA.auto.some(a=>a.id===q.id):DATA.rubric.some(r=>r.id===q.id))));let by=attemptsById();pool=pool.sort((a,b)=>((b.prob||0)-(by[b.id]?.count||0)*8-(by[b.id]?.best||0)/15)-((a.prob||0)-(by[a.id]?.count||0)*8-(by[a.id]?.best||0)/15));return pool.find(q=>q.id!==state.qid)||pool[0]}
function bar(p){let cls=p>=80?"ok":p>=60?"mid":"";return `<div class="bar"><span class="${cls}" style="width:${Math.max(2,p||0)}%"></span></div>`}
function contains(ans,terms){let n=norm(ans);return (terms||[]).some(t=>n.includes(norm(t)))}
function mark(ans,q){let checks=(q.checks||[]).map(c=>({label:c[0],ok:contains(ans,c[1])}));let hits=checks.filter(c=>c.ok).length;let score=Math.round(hits/Math.max(1,checks.length)*q.marks);return{score,percent:Math.round(score/q.marks*100),checks,advice:checks.filter(c=>!c.ok).map(c=>"Add: "+c.label)}}
function saveAttempt(q,r,answer,kind){progress.attempts.push({id:Date.now()+"-"+q.id,qid:q.id,topic:q.topic,marks:q.marks,score:r.score,percent:r.percent,prompt:q.q,answer,kind,ts:Date.now()});progress.attempts=progress.attempts.slice(-2000);save()}
function stats(){let a=progress.attempts||[],score=0,marks=0,by={};a.forEach(x=>{score+=x.score||0;marks+=x.marks||0;by[x.topic]??={score:0,marks:0,count:0};by[x.topic].score+=x.score||0;by[x.topic].marks+=x.marks||0;by[x.topic].count++});let topics=["Development + LICs","Food","Water","Trade","Health + Malaria","PEEL + Source"].map(t=>{let v=by[t]||{score:0,marks:0,count:0};return{topic:t,count:v.count,percent:v.marks?Math.round(v.score/v.marks*100):0}});return{total:a.length,avg:marks?Math.round(score/marks*100):0,topics,weak:topics.filter(t=>!t.count||t.percent<75).sort((a,b)=>a.percent-b.percent||a.count-b.count),recent:a.slice(-20).reverse(),peels:a.filter(x=>x.kind==="rubric")}}

  return `<div class="card" style="margin-top:14px"><h3>Exam tomorrow plan</h3>
  <div class="grid g2" style="margin-top:12px">
    <div class="neutral"><b>Tonight</b><ol><li>Read Study Pack top to bottom.</li><li>Read Q&A: core 70 only.</li><li>Practice: Short answers for 20 minutes.</li><li>Practice: PEEL answers for 20 minutes.</li><li>Review: redo anything below 75%.</li></ol></div>
    <div class="neutral"><b>Exam morning</b><ol><li>Read Key data.</li><li>Read the 7 core case studies.</li><li>Read the PEEL writing rule.</li><li>Do one Mini mock.</li></ol></div>
  </div>
  <div class="warn" style="margin-top:12px"><b>Finish the core first.</b> The extra sections are optional safety nets, not the main task.</div>
</div>
<div class="card" style="margin-top:14px"><h3>Study Pack</h3><div class="grid g2" style="margin-top:12px"><div class="neutral"><h3>Command words</h3>${commands.map(x=>`<div class="gold"><b>${esc(x[0])}</b><br>${esc(x[1])}</div>`).join("")}</div><div class="neutral"><h3>Key data</h3><ul>${keyData.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div></div><div class="neutral" style="margin-top:14px"><h3>Writing rule</h3><div class="sample"><b>Cause → effect → development link</b><br>Conflict damages roads and ports → prices rise → malnutrition increases → quality of life falls.</div><div class="sample"><b>PEEL</b><br>Point → Evidence → Explanation → Link to health, education, income, jobs, equality or quality of life.</div></div></div>
